##############################
### WINDOWS AND WORKSPACES ###
##############################
# https://wiki.hyprland.org/Configuring/Window-Rules/
# Hyprland 0.53+ syntax — match:class / match:title / match:float …

# ── General ───────────────────────────────────────────────────────────
windowrule = suppress_event maximize, match:class .*

# ── Default opacity (all windows) ────────────────────────────────────
windowrule = opacity 0.97 0.9, match:class .*

# ── No opacity on media & visual apps ────────────────────────────────
windowrule = opacity 1 1, match:class ^(vlc|mpv|imv|org.gnome.NautilusPreviewer)$

# ── XWayland fixes ───────────────────────────────────────────────────
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# ── Terminal (kitty floating popup) ──────────────────────────────────
windowrule = opacity 0.97 0.9, match:title ^(terminal)$
windowrule = float on,         match:title ^(terminal)$
windowrule = size 900 600,     match:title ^(terminal)$
windowrule = center on,        match:title ^(terminal)$

# ── Yazi (file manager popup) ────────────────────────────────────────
windowrule = float on,      match:title ^(yazi)$
windowrule = size 1100 700, match:title ^(yazi)$
windowrule = center on,     match:title ^(yazi)$

# ── Rofi ─────────────────────────────────────────────────────────────
windowrule = float on,  match:class ^(rofi)$
windowrule = center on, match:class ^(rofi)$

# ── Popup windows ────────────────────────────────────────────────────
windowrule = float on,     match:class ^popup$
windowrule = size 900 550, match:class ^popup$
windowrule = center on,    match:class ^popup$
windowrule = float on,     match:title ^popup:
windowrule = size 900 550, match:title ^popup:
windowrule = center on,    match:title ^popup:

# ── GNOME Calculator ──────────────────────────────────────────────────
windowrule = float on,  match:class ^(org.gnome.Calculator)$
windowrule = center on, match:class ^(org.gnome.Calculator)$

# ── Picture-in-Picture ───────────────────────────────────────────────
windowrule = float on,             match:title (Picture.?in.?[Pp]icture)
windowrule = pin on,               match:title (Picture.?in.?[Pp]icture)
windowrule = size 600 338,         match:title (Picture.?in.?[Pp]icture)
windowrule = border_size 0,        match:title (Picture.?in.?[Pp]icture)
windowrule = opacity 1 1,          match:title (Picture.?in.?[Pp]icture)
windowrule = move (monitor_w-window_w-40) (monitor_h*0.04), match:title (Picture.?in.?[Pp]icture)
