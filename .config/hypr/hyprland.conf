# ══════════════════════════════════════════════════════════════════
# HYPRLAND — MASTER CONFIG
# https://wiki.hyprland.org/Configuring/
#
# This file only sources sub-files — edit each section in its own file:
#
#   monitors.conf    ← Monitors
#   env.conf         ← Environment variables
#   autostart.conf   ← Autostart
#   looknfeel.conf   ← Look and feel (gaps, blur, animations...)
#   input.conf       ← Keyboard, mouse, touch
#   bindings.conf    ← All keybindings
#   windowrules.conf ← Window rules
#   colors.conf      ← Colors (managed by theme-select.sh)
# ══════════════════════════════════════════════════════════════════

# ── Core applications ──────────────────────────────────────────────
$terminal    = kitty --title "terminal"
$fileManager = kitty --title yazi yazi
$web         = firefox

# ── Sub-files ───────────────────────────────────────────────
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/colors.conf

source = ~/.config/hypr/xdph.conf
