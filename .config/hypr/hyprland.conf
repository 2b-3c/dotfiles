
# #######################################################################################
# HYPRLAND CONFIG
# https://wiki.hyprland.org/Configuring/
# #######################################################################################

# You can split this configuration into multiple files
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty --title "terminal"
$fileManager = kitty --title "lf" -e lf
$web  = firefox
$menu = rofi -show drun -config ~/.config/rofi/app-launcher.rasi
$r_scr = ~/.config/rofi/scripts


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = bash ~/.config/hypr/scripts/restore_wallpaper.sh
exec-once = swaync
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# cursor
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Bibata-Modern-Classic"
exec-once = gsettings set org.gnome.desktop.interface cursor-size 16
exec-once = hyprctl setcursor Bibata-Modern-Classic 16


#############################
### ENVIRONMENT VARIABLES ###
#############################

# cursor
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,16
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,16
env = QT_CURSOR_THEME,Bibata-Modern-Classic
env = QT_CURSOR_SIZE,16


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 8

    border_size = 2

    col.active_border = rgba(6f6959ff) rgba(514f49ff) 45deg
    col.inactive_border = rgba(ded1acaa)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# "Smart gaps" — uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############

input {
    kb_layout = us,ara
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gestures {
#    workspace_swipe = false
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,          # SUPER+SHIFT+M للخروج (أمان ضد الضغط العرضي)
bind = $mainMod, F,   exec, $web
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, V, togglefloating,
bind = $mainMod, A, exec, rofi -show drun   -config ~/.config/rofi/app-launcher.rasi
bind = $mainMod, R, exec, rofi -show run    -config ~/.config/rofi/run-launcher.rasi
bind = $mainMod, W, exec, rofi -show window -config ~/.config/rofi/window-switcher.rasi
bind = $mainMod, Space, exec, $r_scr/launcher-menu.sh
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = SUPER, C, exec, cliphist list | grep -v '^\S*\s*\[\[ binary data' | rofi -dmenu -display-columns 2 -p " " -config ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind = SUPER SHIFT, C, exec, bash ~/.config/rofi/scripts/clipboard-images.sh
bind = SUPER, period, exec, rofi -modi emoji -show emoji -config ~/.config/rofi/emoji.rasi
bind = $mainMod, O, exec, $r_scr/nowplaying.sh
bind = $mainMod, I, exec, $r_scr/wallpaper-select.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, B, exec, pkill waybar; waybar &
bind = $mainMod SHIFT, X, exec, hyprlock

# Special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Save a full screenshot
bind = $mainMod, Print, exec, hyprshot -m output -o ~/Pictures/Screenshots

# Save a screenshot of the active window
bind = Ctrl+$mainMod, Print, exec, hyprshot -m window -o ~/Pictures/Screenshots

# Save a screenshot of a selected region
bind = Ctrl+Shift, Print, exec, hyprshot -m region -o ~/Pictures/Screenshots

# Copy a full screenshot to clipboard
bind = , Print, exec, grim - | wl-copy

# Copy a screenshot of the active window to clipboard
bind = Ctrl, Print, exec, hyprshot -m window -o - | wl-copy

# Copy a screenshot of a selected region to clipboard
bind = $mainMod+Shift, s, exec, grim -g "$(slurp)" - | wl-copy

##############################
### WINDOWS AND WORKSPACES ###
##############################

# lf file manager — floating popup
windowrule = float on, match:title ^(lf)$
windowrule = size 900 600, match:title ^(lf)$
windowrule = center 1, match:title ^(lf)$

# terminal — floating popup
windowrule = float on, match:title ^(terminal)$
windowrule = size 900 600, match:title ^(terminal)$
windowrule = center 1, match:title ^(terminal)$



# Ignore maximize requests from apps.
# Fix some dragging issues with XWayland
# windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
