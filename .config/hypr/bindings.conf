###################
### KEYBINDINGS ###
###################
# https://wiki.hyprland.org/Configuring/Binds/

$mainMod = SUPER

# ── Applications ──────────────────────────────────────────────────
bindd = $mainMod,       T,     Terminal,      exec, $terminal
bindd = $mainMod,       F,     Browser,       exec, $web
bindd = $mainMod, E,     File Manager,  exec, $fileManager

# ── Window management ─────────────────────────────────────────────
bindd = $mainMod,       Q,     Close window,          killactive,
bindd = $mainMod SHIFT, M,     Exit Hyprland,         exit,
bindd = $mainMod,       V,     Toggle floating,        togglefloating,
bindd = $mainMod,       P,     Pseudo tile,            pseudo,
bindd = $mainMod,       J,     Toggle split,           layoutmsg, togglesplit
bindd = $mainMod,       F11,   Full screen,            fullscreen, 0
bindd = $mainMod,       L,     Toggle workspace layout, exec, ~/.config/hypr/scripts/workspace-layout-toggle.sh
bindd = $mainMod,       U,     Pop window out (float+pin), exec, ~/.config/hypr/scripts/window-pop.sh

# ── Window resizing ───────────────────────────────────────────────
bindd = $mainMod,       code:20, Expand window left,  resizeactive, -100 0
bindd = $mainMod,       code:21, Shrink window left,  resizeactive, 100 0
bindd = $mainMod SHIFT, code:20, Shrink window up,    resizeactive, 0 -100
bindd = $mainMod SHIFT, code:21, Expand window down,  resizeactive, 0 100

# ── Window cycling ────────────────────────────────────────────────
# cyclenext + bringactivetotop معاً = Alt+Tab سلوك طبيعي
bindd = ALT,       TAB, Cycle to next window,    cyclenext,
bindd = ALT,       TAB, Bring active to top,     bringactivetotop,
bindd = ALT SHIFT, TAB, Cycle to prev window,    cyclenext, prev
bindd = ALT SHIFT, TAB, Bring active to top,     bringactivetotop,

# ── Window grouping ───────────────────────────────────────────────
bindd = $mainMod,     G,   Toggle window group,           togglegroup,
bindd = $mainMod ALT, G,   Move window out of group,      moveoutofgroup,
bindd = $mainMod ALT, TAB, Next window in group,          changegroupactive, f
bindd = $mainMod ALT SHIFT, TAB, Prev window in group,   changegroupactive, b
bindd = $mainMod CTRL, left,  Move group focus left,      changegroupactive, b
bindd = $mainMod CTRL, right, Move group focus right,     changegroupactive, f
bindd = $mainMod ALT, left,  Move window into left group,  moveintogroup, l
bindd = $mainMod ALT, right, Move window into right group, moveintogroup, r
bindd = $mainMod ALT, up,    Move window into top group,   moveintogroup, u
bindd = $mainMod ALT, down,  Move window into bottom group,moveintogroup, d

# ── Scratchpad ────────────────────────────────────────────────────
bindd = $mainMod,     S,   Toggle scratchpad,        togglespecialworkspace, scratchpad
bindd = $mainMod ALT, S,   Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# ── Aesthetics toggles ────────────────────────────────────────────
bindd = $mainMod,           BackSpace, Toggle window transparency, exec, ~/.config/hypr/scripts/window-transparency-toggle.sh
bindd = $mainMod SHIFT,     BackSpace, Toggle window gaps,         exec, ~/.config/hypr/scripts/window-gaps-toggle.sh

# ── Rofi menus ────────────────────────────────────────────────────
bindd = $mainMod,       Space, Main menu,         exec, ~/.config/rofi/scripts/launcher-menu.sh
bindd = $mainMod,       A,     App launcher,      exec, rofi -show drun   -config ~/.config/rofi/app-launcher.rasi
bindd = $mainMod,       R,     Run launcher,      exec, rofi -show run    -config ~/.config/rofi/run-launcher.rasi
bindd = $mainMod,       W,     Window switcher,   exec, bash ~/.config/rofi/scripts/window-switcher.sh
bindd = $mainMod,       O,     Now playing,       exec, ~/.config/rofi/scripts/nowplaying.sh
bindd = $mainMod,       I,     Wallpaper select,  exec, ~/.config/rofi/scripts/wallpaper-select.sh

# ── Clipboard & utilities ─────────────────────────────────────────
bindd = $mainMod,       N,      Notifications,    exec, swaync-client -t -sw
bindd = SUPER,          C,      Clipboard,        exec, cliphist list | grep -v '^\S*\s*\[\[ binary data' | rofi -dmenu -display-columns 2 -p " " -config ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bindd = SUPER SHIFT,    C,      Clipboard images, exec, bash ~/.config/rofi/scripts/clipboard-images.sh
bindd = SUPER,          period, Emoji picker,     exec, rofi -modi emoji -show emoji -config ~/.config/rofi/emoji.rasi

# ── Waybar / lock ─────────────────────────────────────────────────
bindd = $mainMod SHIFT, B,     Restart Waybar,   exec, pkill waybar; waybar &
bindd = $mainMod SHIFT, X,     Lock screen,      exec, hyprlock

# ── Focus movement ────────────────────────────────────────────────
bindd = $mainMod, left,  Move focus left,  movefocus, l
bindd = $mainMod, right, Move focus right, movefocus, r
bindd = $mainMod, up,    Move focus up,    movefocus, u
bindd = $mainMod, down,  Move focus down,  movefocus, d

# ── Workspaces ────────────────────────────────────────────────────
bindd = $mainMod, code:10, Workspace 1,  workspace, 1
bindd = $mainMod, code:11, Workspace 2,  workspace, 2
bindd = $mainMod, code:12, Workspace 3,  workspace, 3
bindd = $mainMod, code:13, Workspace 4,  workspace, 4
bindd = $mainMod, code:14, Workspace 5,  workspace, 5
bindd = $mainMod, code:15, Workspace 6,  workspace, 6
bindd = $mainMod, code:16, Workspace 7,  workspace, 7
bindd = $mainMod, code:17, Workspace 8,  workspace, 8
bindd = $mainMod, code:18, Workspace 9,  workspace, 9
bindd = $mainMod, code:19, Workspace 10, workspace, 10

# ── Move window to workspace ──────────────────────────────────────
bindd = $mainMod SHIFT, code:10, Move to workspace 1,  movetoworkspace, 1
bindd = $mainMod SHIFT, code:11, Move to workspace 2,  movetoworkspace, 2
bindd = $mainMod SHIFT, code:12, Move to workspace 3,  movetoworkspace, 3
bindd = $mainMod SHIFT, code:13, Move to workspace 4,  movetoworkspace, 4
bindd = $mainMod SHIFT, code:14, Move to workspace 5,  movetoworkspace, 5
bindd = $mainMod SHIFT, code:15, Move to workspace 6,  movetoworkspace, 6
bindd = $mainMod SHIFT, code:16, Move to workspace 7,  movetoworkspace, 7
bindd = $mainMod SHIFT, code:17, Move to workspace 8,  movetoworkspace, 8
bindd = $mainMod SHIFT, code:18, Move to workspace 9,  movetoworkspace, 9
bindd = $mainMod SHIFT, code:19, Move to workspace 10, movetoworkspace, 10

# ── Move window to workspace silently ────────────────────────────
bindd = $mainMod SHIFT ALT, code:10, Move silently to workspace 1,  movetoworkspacesilent, 1
bindd = $mainMod SHIFT ALT, code:11, Move silently to workspace 2,  movetoworkspacesilent, 2
bindd = $mainMod SHIFT ALT, code:12, Move silently to workspace 3,  movetoworkspacesilent, 3
bindd = $mainMod SHIFT ALT, code:13, Move silently to workspace 4,  movetoworkspacesilent, 4
bindd = $mainMod SHIFT ALT, code:14, Move silently to workspace 5,  movetoworkspacesilent, 5
bindd = $mainMod SHIFT ALT, code:15, Move silently to workspace 6,  movetoworkspacesilent, 6
bindd = $mainMod SHIFT ALT, code:16, Move silently to workspace 7,  movetoworkspacesilent, 7
bindd = $mainMod SHIFT ALT, code:17, Move silently to workspace 8,  movetoworkspacesilent, 8
bindd = $mainMod SHIFT ALT, code:18, Move silently to workspace 9,  movetoworkspacesilent, 9
bindd = $mainMod SHIFT ALT, code:19, Move silently to workspace 10, movetoworkspacesilent, 10

# ── Workspace scroll ──────────────────────────────────────────────
bindd = $mainMod, TAB,       Next workspace,     workspace, e+1
bindd = $mainMod SHIFT, TAB, Previous workspace, workspace, e-1
bindd = $mainMod CTRL,  TAB, Former workspace,   workspace, previous
bindd = $mainMod, mouse_down, Scroll workspace forward,  workspace, e+1
bindd = $mainMod, mouse_up,   Scroll workspace backward, workspace, e-1

# ── Move workspace to other monitor ──────────────────────────────
bindd = $mainMod SHIFT ALT, left,  Move workspace to left monitor,   movecurrentworkspacetomonitor, l
bindd = $mainMod SHIFT ALT, right, Move workspace to right monitor,  movecurrentworkspacetomonitor, r
bindd = $mainMod SHIFT ALT, up,    Move workspace to top monitor,    movecurrentworkspacetomonitor, u
bindd = $mainMod SHIFT ALT, down,  Move workspace to bottom monitor, movecurrentworkspacetomonitor, d

# ── Move/resize with mouse ────────────────────────────────────────
bindmd = $mainMod, mouse:272, Move window,   movewindow
bindmd = $mainMod, mouse:273, Resize window, resizewindow

# ── Swap windows ──────────────────────────────────────────────────
bindd = $mainMod SHIFT, left,  Swap left,  swapwindow, l
bindd = $mainMod SHIFT, right, Swap right, swapwindow, r
bindd = $mainMod SHIFT, up,    Swap up,    swapwindow, u
bindd = $mainMod SHIFT, down,  Swap down,  swapwindow, d

# ── Multimedia keys ───────────────────────────────────────────────
bindeld = ,XF86AudioRaiseVolume,  Volume up,          exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindeld = ,XF86AudioLowerVolume,  Volume down,        exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindeld = ,XF86AudioMute,         Mute,               exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindeld = ,XF86AudioMicMute,      Mute microphone,    exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindeld = ,XF86MonBrightnessUp,   Brightness up,      exec, brightnessctl s 5%+
bindeld = ,XF86MonBrightnessDown, Brightness down,    exec, brightnessctl s 5%-

bindld = ,XF86AudioNext,  Next track,  exec, playerctl next
bindld = ,XF86AudioPause, Pause,       exec, playerctl play-pause
bindld = ,XF86AudioPlay,  Play,        exec, playerctl play-pause
bindld = ,XF86AudioPrev,  Prev track,  exec, playerctl previous

# u2500u2500 Audio output switch u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500
bindd = $mainMod, XF86AudioMute, Switch audio output, exec, ~/.config/hypr/scripts/audio-switch.sh

# u2500u2500 Display 
bindd = $mainMod SHIFT, equal, Cycle monitor scaling, exec, ~/.config/hypr/scripts/monitor-scaling-cycle.sh

# u2500u2500 Night light u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500
bindd = $mainMod SHIFT, N, Toggle night light, exec, ~/.config/hypr/scripts/nightlight-toggle.sh

# u2500u2500 Aesthetics extras u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500u2500
bindd = $mainMod SHIFT, Y, Toggle square window aspect, exec, ~/.config/hypr/scripts/window-single-square-toggle.sh

# ── Screenshots ───────────────────────────────────────────────────
bindd = ,               Print,         Screenshot (smart),         exec, ~/.config/hypr/scripts/screenshot.sh smart
bindd = $mainMod,       Print,         Screenshot (fullscreen),    exec, ~/.config/hypr/scripts/screenshot.sh fullscreen
bindd = Ctrl $mainMod,  Print,         Screenshot (windows),       exec, ~/.config/hypr/scripts/screenshot.sh windows
bindd = $mainMod SHIFT, S,             Screenshot (region→clip),   exec, ~/.config/hypr/scripts/screenshot.sh region clip

# ── Screen Recording ─────────────────────────────────────────────
bindd = $mainMod SHIFT,     R,  Screen record (toggle),          exec, ~/.config/hypr/scripts/screenrecord.sh
bindd = $mainMod SHIFT ALT, R,  Screen record (with audio),      exec, ~/.config/hypr/scripts/screenrecord.sh --with-desktop-audio --with-microphone-audio

# ── Display & Font ────────────────────────────────────────────────
bindd = $mainMod,       F8,  Monitor scaling cycle,                  exec, ~/.config/hypr/scripts/monitor-scaling-cycle.sh
bindd = $mainMod SHIFT, F8,  Single window square aspect toggle,     exec, ~/.config/hypr/scripts/window-single-square-toggle.sh

# ── Audio Output Switch ───────────────────────────────────────────
bindd = $mainMod, XF86AudioMute,  Audio output switch,               exec, ~/.config/hypr/scripts/audio-switch.sh

# ── Night Light ───────────────────────────────────────────────────
bindd = $mainMod, F7,  Toggle night light,                           exec, ~/.config/hypr/scripts/nightlight-toggle.sh

# ── Video Wallpaper ───────────────────────────────────────────────
# Super+Shift+I  → Video wallpaper picker
# Super+Ctrl+I   → Toggle last video wallpaper on/off
bindd = $mainMod SHIFT, I,     Video wallpaper selector,   exec, bash ~/.config/rofi/scripts/video-wallpaper-select.sh
bindd = $mainMod CTRL,  I,     Toggle video wallpaper,     exec, bash ~/.config/hypr/scripts/video-wallpaper.sh toggle
