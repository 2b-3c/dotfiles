# ══════════════════════════════════════════════════════════
# HYPRLOCK — Sky Blue Theme
# العناصر في الجانب الأيسر فوق الخلفية مباشرة
# ══════════════════════════════════════════════════════════

$img      = ~/.config/hypr/hyprlock/assets

$c-time   = rgba(75, 210, 240, 1.0)
$c-date   = rgba(45, 150, 180, 1.0)
$c-fg     = rgba(202, 240, 248, 1.0)
$c-fg-dim = rgba(202, 240, 248, 0.55)
$c-accent = rgba(45, 165, 195, 1.0)
$c-field  = rgba(0, 20, 40, 0.55)
$c-warn   = rgba(225, 180, 75, 1.0)

$font    = ESPACION
$font-ui = monospace

# المسافة من اليسار لكل العناصر
$left = 120

# ── General ───────────────────────────────────────────────
general {
    disable_loading_bar  = true
    hide_cursor          = false
    ignore_empty_input   = true
    immediate_render     = true
}

# ── Background ────────────────────────────────────────────
background {
    monitor     =
    path        = $img/sky_blue_bg.png
    blur_passes = 0
    brightness  = 1.0
}

# ── CLOCK ─────────────────────────────────────────────────
label {
    monitor       =
    text          = cmd[update:1000] date +"%H:%M"
    color         = $c-time
    font_family   = $font
    font_size     = 90
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(0, 10, 25, 0.7)

    position = $left, 160
    halign   = left
    valign   = center
}

label {
    monitor       =
    text          = cmd[update:1000] date +"%A %-d %B"
    color         = $c-date
    font_family   = $font
    font_size     = 22
    shadow_passes = 2
    shadow_size   = 3
    shadow_color  = rgba(0, 10, 25, 0.7)

    position = $left, 65
    halign   = left
    valign   = center
}

label {
    monitor     =
    text        = cmd[update:60000] date +"%Y"
    color       = $c-fg-dim
    font_family = $font-ui
    font_size   = 11

    position = $left, 35
    halign   = left
    valign   = center
}

# ── Separator ─────────────────────────────────────────────
shape {
    monitor  =
    size     = 280, 1
    color    = $c-accent
    rounding = 0
    position = $left, 10
    halign   = left
    valign   = center
}

# ── Username ──────────────────────────────────────────────
label {
    monitor       =
    text          = cmd[update:0] echo "$USER"
    color         = $c-fg
    font_family   = $font
    font_size     = 14
    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(0, 10, 25, 0.9)

    position = $left, -10
    halign   = left
    valign   = center
}

# ── Password field ────────────────────────────────────────
input-field {
    monitor           =
    size              = 280, 42
    rounding          = 0
    outline_thickness = 2

    inner_color  = $c-field
    outer_color  = rgba(45, 150, 180, 0.6)
    check_color  = $c-accent
    fail_color   = $c-warn

    font_family  = $font
    font_color   = $c-fg
    font_size    = 13

    dots_size     = 0.28
    dots_spacing  = 0.30
    dots_center   = true
    dots_rounding = -1

    placeholder_text = <i>password</i>
    fail_text        = <span foreground="##e1b44b">Wrong password  ($ATTEMPTS)</span>

    fade_on_empty   = false
    fail_transition = 300
    hide_input      = false

    position = $left, -60
    halign   = left
    valign   = center
}

# Enter hint
label {
    monitor     =
    text        = ↵  Enter to unlock
    color       = $c-fg-dim
    font_family = $font-ui
    font_size   = 10

    position = $left, -115
    halign   = left
    valign   = center
}

# ── System buttons ────────────────────────────────────────
label {
    monitor       =
    text          = 󰐦  Shutdown
    color         = $c-date
    font_family   = $font-ui
    font_size     = 11
    shadow_passes = 1
    shadow_color  = rgba(0, 10, 25, 0.9)

    position = $left, -185
    halign   = left
    valign   = center
}

label {
    monitor       =
    text          = 󰑓  Reboot
    color         = $c-date
    font_family   = $font-ui
    font_size     = 11
    shadow_passes = 1
    shadow_color  = rgba(0, 10, 25, 0.9)

    position = 280, -185
    halign   = left
    valign   = center
}

label {
    monitor       =
    text          = 󰒲  Suspend
    color         = $c-date
    font_family   = $font-ui
    font_size     = 11
    shadow_passes = 1
    shadow_color  = rgba(0, 10, 25, 0.9)

    position = 420, -185
    halign   = left
    valign   = center
}

# ── Bottom widgets ────────────────────────────────────────
label {
    monitor       =
    text          = cmd[update:1000] ~/.config/hypr/hyprlock/lang_notify.sh --hyprlock
    color         = $c-accent
    font_family   = $font-ui
    font_size     = 12
    shadow_passes = 1
    shadow_color  = rgba(0, 10, 25, 0.9)

    position = $left, 30
    halign   = left
    valign   = bottom

    allow_click  = true
    click_action = exec ~/.config/hypr/hyprlock/lang_notify.sh --switch
}

label {
    monitor       =
    text          = cmd[update:5000] ~/.config/hypr/hyprlock/battery.sh --hyprlock
    color         = $c-fg
    font_family   = $font-ui
    font_size     = 12
    shadow_passes = 1
    shadow_color  = rgba(0, 10, 25, 0.9)

    position = 280, 30
    halign   = left
    valign   = bottom
}
