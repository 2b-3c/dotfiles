# COLORS — Gruvbox Light
$foreground = rgba(51, 50, 49, 1.0)

# BACKGROUND
background {
    monitor =
    path = screenshot
    color = rgba(241, 228, 187, 1.0)
    blur_passes = 2
}

# GENERAL
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(111, 105, 89, 0.8)
    inner_color = rgba(222, 209, 172, 0.9)
    font_color = $foreground
    fade_on_empty = false
    rounding = -1
    check_color = rgb(111, 105, 89)
    placeholder_text = <i><span foreground="##514f49">Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(81, 79, 73, 0.85)
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = rgba(81, 79, 73, 0.85)
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}
