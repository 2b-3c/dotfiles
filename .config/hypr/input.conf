#############
### INPUT ###
#############
# https://wiki.hyprland.org/Configuring/Variables/#input

input {
    kb_layout  = us,ara
    kb_variant =
    kb_model   =
    kb_options = grp:alt_shift_toggle
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    repeat_rate  = 40
    repeat_delay = 600

    numlock_by_default = true

    touchpad {
        natural_scroll       = false
        tap-to-click         = true
        disable_while_typing = true
        scroll_factor        = 0.4
    }
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}
