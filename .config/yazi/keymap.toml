# ══════════════════════════════════════════════════════════════════
# YAZI — Keymap Configuration
# Place at: ~/.config/yazi/keymap.toml
# ══════════════════════════════════════════════════════════════════

[manager]
keymap = [
  # ── Navigation ──────────────────────────────────────────────────
  { on = "h",          run = "leave",              desc = "Go to parent directory" },
  { on = "l",          run = "enter",              desc = "Enter directory / open file" },
  { on = "j",          run = "arrow 1",            desc = "Move down" },
  { on = "k",          run = "arrow -1",           desc = "Move up" },
  { on = "<Up>",       run = "arrow -1",           desc = "Move up" },
  { on = "<Down>",     run = "arrow 1",            desc = "Move down" },
  { on = "<Left>",     run = "leave",              desc = "Go to parent directory" },
  { on = "<Right>",    run = "enter",              desc = "Enter directory / open file" },

  { on = "<C-u>",      run = "arrow -50%",         desc = "Scroll up half page" },
  { on = "<C-d>",      run = "arrow 50%",          desc = "Scroll down half page" },
  { on = "<C-b>",      run = "arrow -100%",        desc = "Scroll up full page" },
  { on = "<C-f>",      run = "arrow 100%",         desc = "Scroll down full page" },

  { on = "g",          run = "arrow -99999999",    desc = "Go to top" },
  { on = "G",          run = "arrow 99999999",     desc = "Go to bottom" },
  { on = "~",          run = "cd ~",               desc = "Go to home directory" },

  # ── File operations ──────────────────────────────────────────────
  { on = "<Enter>",    run = "open",               desc = "Open selected file" },
  { on = "o",          run = "open --interactive", desc = "Open interactively" },
  { on = "r",          run = "rename --cursor=before_ext", desc = "Rename" },
  { on = "d",          run = "remove",             desc = "Move to trash" },
  { on = "D",          run = "remove --permanently", desc = "Delete permanently" },
  { on = "a",          run = "create",             desc = "Create file/directory" },
  { on = "y",          run = "yank",               desc = "Copy" },
  { on = "x",          run = "yank --cut",         desc = "Cut" },
  { on = "p",          run = "paste",              desc = "Paste" },
  { on = "P",          run = "paste --force",      desc = "Paste (overwrite)" },
  { on = "Y",          run = "unyank",             desc = "Cancel yank" },

  # ── Selection ────────────────────────────────────────────────────
  { on = "<Space>",    run = ["select --state=none", "arrow 1"], desc = "Toggle selection" },
  { on = "v",          run = "visual_mode",        desc = "Visual mode" },
  { on = "V",          run = "select_all --state=none", desc = "Select/deselect all" },

  # ── Search & filter ──────────────────────────────────────────────
  { on = "f",          run = "find",               desc = "Find" },
  { on = "F",          run = "find --previous",    desc = "Find previous" },
  { on = "/",          run = "search fd",          desc = "Search with fd" },
  { on = "z",          run = "jump zoxide",        desc = "Jump with zoxide" },

  # ── Tabs ─────────────────────────────────────────────────────────
  { on = "t",          run = "tab_create --current", desc = "New tab" },
  { on = "[",          run = "tab_switch -1 --relative", desc = "Previous tab" },
  { on = "]",          run = "tab_switch 1 --relative",  desc = "Next tab" },
  { on = "1",          run = "tab_switch 0",       desc = "Switch to tab 1" },
  { on = "2",          run = "tab_switch 1",       desc = "Switch to tab 2" },
  { on = "3",          run = "tab_switch 2",       desc = "Switch to tab 3" },

  # ── Sorting ──────────────────────────────────────────────────────
  { on = ["s", "n"],   run = "sort natural --dir-first",  desc = "Sort naturally" },
  { on = ["s", "m"],   run = "sort modified --dir-first", desc = "Sort by modified" },
  { on = ["s", "s"],   run = "sort size --dir-first",     desc = "Sort by size" },
  { on = ["s", "e"],   run = "sort extension --dir-first",desc = "Sort by extension" },

  # ── Toggle hidden ────────────────────────────────────────────────
  { on = ".",          run = "hidden toggle",      desc = "Toggle hidden files" },

  # ── Shell ────────────────────────────────────────────────────────
  { on = "!",          run = "shell --interactive --block", desc = "Open shell" },

  # ── Copy path ────────────────────────────────────────────────────
  { on = ["c", "c"],   run = "copy cell",          desc = "Copy filename" },
  { on = ["c", "p"],   run = "copy path",          desc = "Copy absolute path" },
  { on = ["c", "d"],   run = "copy dirname",       desc = "Copy directory path" },

  # ── Quit ─────────────────────────────────────────────────────────
  { on = "q",          run = "quit",               desc = "Quit" },
  { on = "Q",          run = "quit --no-cwd-file", desc = "Quit without cwd" },
  { on = "<Esc>",      run = "escape",             desc = "Escape / cancel" },
]

[input]
keymap = [
  { on = "<Enter>",    run = "close",              desc = "Confirm" },
  { on = "<Esc>",      run = "close --submit=false", desc = "Cancel" },
  { on = "<C-c>",      run = "close --submit=false", desc = "Cancel" },

  { on = "<Left>",     run = "move -1",            desc = "Move left" },
  { on = "<Right>",    run = "move 1",             desc = "Move right" },
  { on = "<Home>",     run = "move -999",          desc = "Home" },
  { on = "<End>",      run = "move 999",           desc = "End" },
  { on = "<Backspace>",run = "backspace",           desc = "Backspace" },
  { on = "<Delete>",   run = "backspace --under",  desc = "Delete" },

  { on = "h",          run = "move -1",            desc = "Move left" },
  { on = "l",          run = "move 1",             desc = "Move right" },
  { on = "<C-a>",      run = "move -999",          desc = "Home" },
  { on = "<C-e>",      run = "move 999",           desc = "End" },
  { on = "<C-w>",      run = "backspace --word",   desc = "Delete word" },
  { on = "<C-u>",      run = "backspace --line",   desc = "Clear line" },
]

[confirm]
keymap = [
  { on = "<Esc>",   run = "close",              desc = "Cancel" },
  { on = "<C-c>",   run = "close",              desc = "Cancel" },
  { on = "n",       run = "close",              desc = "No" },
  { on = "<Enter>", run = "close --submit",     desc = "Confirm" },
  { on = "y",       run = "close --submit",     desc = "Yes" },
  { on = "k",       run = "arrow -1",           desc = "Move up" },
  { on = "j",       run = "arrow 1",            desc = "Move down" },
]

[select]
keymap = [
  { on = "<Esc>",   run = "close",              desc = "Cancel" },
  { on = "<C-c>",   run = "close",              desc = "Cancel" },
  { on = "<Enter>", run = "close --submit",     desc = "Confirm" },
  { on = "k",       run = "arrow -1",           desc = "Move up" },
  { on = "j",       run = "arrow 1",            desc = "Move down" },
  { on = "<Up>",    run = "arrow -1",           desc = "Move up" },
  { on = "<Down>",  run = "arrow 1",            desc = "Move down" },
]

[tasks]
keymap = [
  { on = "<Esc>",   run = "close",              desc = "Close task panel" },
  { on = "k",       run = "arrow -1",           desc = "Move up" },
  { on = "j",       run = "arrow 1",            desc = "Move down" },
  { on = "<Enter>", run = "inspect",            desc = "Inspect task" },
  { on = "x",       run = "cancel",             desc = "Cancel task" },
]

[spot]
keymap = [
  { on = "<Esc>",   run = "close",              desc = "Close spot" },
  { on = "<Tab>",   run = "swipe 1",            desc = "Next entry" },
  { on = "<S-Tab>", run = "swipe -1",           desc = "Prev entry" },
  { on = "k",       run = "arrow -1",           desc = "Move up" },
  { on = "j",       run = "arrow 1",            desc = "Move down" },
]

[completion]
keymap = [
  { on = "<Tab>",   run = "close --submit",     desc = "Confirm completion" },
  { on = "<Esc>",   run = "close",              desc = "Cancel completion" },
  { on = "<Up>",    run = "arrow -1",           desc = "Move up" },
  { on = "<Down>",  run = "arrow 1",            desc = "Move down" },
]

[help]
keymap = [
  { on = "<Esc>",   run = "close",              desc = "Close help" },
  { on = "k",       run = "arrow -1",           desc = "Move up" },
  { on = "j",       run = "arrow 1",            desc = "Move down" },
  { on = "/",       run = "filter",             desc = "Filter" },
]
