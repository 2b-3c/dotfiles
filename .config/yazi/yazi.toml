# ══════════════════════════════════════════════════════════════════
# YAZI — Main Configuration
# Place at: ~/.config/yazi/yazi.toml
# Docs: https://yazi-rs.github.io/docs/configuration/yazi
# ══════════════════════════════════════════════════════════════════

[manager]
ratio          = [1, 3, 4]   # Left (parent) : Middle (current) : Right (preview)
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
tab_size        = 2
max_width       = 1200
max_height      = 900
cache_dir       = ""
image_filter    = "lanczos3"
image_quality   = 85
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [0.0, 0.0, 0.0, 0.0]

[opener]
# Text editors
edit = [
  { run = '$EDITOR "$@"',     desc = "$EDITOR",  block = true, for = "unix" },
]
# Open in default app
open = [
  { run = 'xdg-open "$@"',   desc = "Open",     for = "linux" },
]
# Reveal in terminal
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "linux" },
]
# Play media
play = [
  { run = 'mpv "$@"',        desc = "mpv",      for = "unix" },
]
# View images
view = [
  { run = 'imv "$@"',        desc = "imv",      for = "unix" },
]

[open]
rules = [
  # Text / code
  { mime = "text/*",              use = ["edit", "open"] },
  { mime = "application/json",    use = ["edit", "open"] },
  { mime = "*/xml",               use = ["edit", "open"] },

  # Images
  { mime = "image/*",             use = ["view", "open"] },

  # Video / audio
  { mime = "video/*",             use = ["play", "open"] },
  { mime = "audio/*",             use = ["play", "open"] },

  # PDF / docs
  { mime = "application/pdf",     use = ["open"] },
  { mime = "application/*",       use = ["open"] },

  # Fallback
  { mime = "*",                   use = ["open"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512 MB
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
